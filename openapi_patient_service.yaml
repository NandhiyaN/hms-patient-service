openapi: 3.0.3
info:
  title: Patient Service API
  version: 1.0.0
  description: HMS Patient Service with PII-safe logging and RBAC

servers:
  - url: http://localhost:9001

paths:

  /health:
    get:
      summary: Health Check
      tags: [Health]
      responses:
        "200":
          description: Service is healthy
          headers:
            X-Correlation-ID:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string

  /ready:
    get:
      summary: Readiness Check
      tags: [Health]
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string
                  ready:
                    type: boolean

  /v1/patients:
    get:
      summary: Get patients (paginated)
      security:
        - BearerAuth: []
      parameters:
        - name: name
          in: query
          schema:
            type: string
        - name: phone
          in: query
          schema:
            type: string
        - name: is_active
          in: query
          schema:
            type: boolean
            default: true
        - name: skip
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 9
      responses:
        "200":
          description: Paginated patient list
          headers:
            X-Correlation-ID:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      summary: Create patient
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientCreate"
      responses:
        "201":
          description: Patient created
          headers:
            X-Correlation-ID:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/patients/{patient_id}:
    get:
      summary: Get patient by ID
      security:
        - BearerAuth: []
      parameters:
        - name: patient_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Patient details
          headers:
            X-Correlation-ID:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      summary: Update patient
      security:
        - BearerAuth: []
      parameters:
        - name: patient_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientUpdate"
      responses:
        "200":
          description: Patient updated
          headers:
            X-Correlation-ID:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

    delete:
      summary: Deactivate patient (soft delete)
      security:
        - BearerAuth: []
      parameters:
        - name: patient_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Patient deactivated
          headers:
            X-Correlation-ID:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  patient_id:
                    type: integer
        "404":
          $ref: "#/components/responses/NotFound"

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  schemas:

    PatientResponse:
      type: object
      properties:
        patient_id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        dob:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    PatientListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PatientResponse"
        total:
          type: integer
        skip:
          type: integer
        limit:
          type: integer

    PatientCreate:
      type: object
      required: [name, email, phone, dob]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        dob:
          type: string
          example: "1995-05-20"

    PatientUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        dob:
          type: string
        is_active:
          type: boolean

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        correlationId:
          type: string
        details:
          type: array
          items:
            type: object

  responses:

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Conflict:
      description: Conflict error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

tags:
  - name: Health
  - name: Patients